<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>music.bootstrap</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>

<body class="bg-dark bg-gradient text-white">
    <nav class="navbar navbar-expand-lg bg-black navbar-dark">
        <div class="container-fluid">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarTogglerDemo01"
                aria-controls="navbarTogglerDemo01" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarTogglerDemo01">
                <a class="navbar-brand" href="#">🎵 MusicFlow</a>
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Link</a>
                    </li>
                    <!-- <li class="nav-item">
          <a class="nav-link disabled" aria-disabled="true">Disabled</a>
        </li> -->
                </ul>
                <form class="d-flex ms-auto" role="search">
                    <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" />
                    <button class="btn btn-outline-light" type="submit">Search</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container-lg">
        <div class="row py-5">
            <div class="col-md-6">
                <h1>Music</h1>
                <p class="h4">Listen to your favourite Music</p>
                <button class="btn btn-success">Download Here</button>
            </div>
            <div class="col-md-6">
                <img class="img-fluid"
                    src="https://images.pexels.com/photos/13828313/pexels-photo-13828313.jpeg"
                    alt="music">
            </div>
        </div>
    </div>

    <div class="container-lg">
        <h1>Playlist</h1>
        <div class="row">
            <div class="col-md-3">
                <div class="card">
                    <img src="https://media.istockphoto.com/id/2196596489/photo/young-couple-photographing-and-enjoying-hiking-in-forest.jpg?s=2048x2048&w=is&k=20&c=eWH-yNj9mtsiMP_XcIea9k2-sX-WuCHCEEWrATfu8-s="
                        class="card-img-top" alt="...">
                    <div class="card-body">
                        <a href="#" class="btn btn-primary">Listen Now</a>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card">
                    <img src="https://images.pexels.com/photos/6270260/pexels-photo-6270260.jpeg"
                        class="card-img-top" alt="...">
                    <div class="card-body">
                        <a href="#" class="btn btn-primary">Listen Now</a>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card">
                    <img src="https://images.pexels.com/photos/6270260/pexels-photo-6270260.jpeg"
                        class="card-img-top" alt="...">
                    <div class="card-body">
                        <a href="#" class="btn btn-primary">Listen Now</a>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card">
                    <img src="https://i.pinimg.com/736x/3e/ae/7e/3eae7ee9d02f5bcb320ec1f5c4d809aa.jpg"
                        class="card-img-top" alt="...">
                    <div class="card-body">
                        <a href="#" class="btn btn-primary">Listen Now</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container-lg">
        <h1>Your playlist</h1>
        <div class="row py-5">
            <ul class="list-group list-group-flush bg-transparent">
                <li class="list-group-item d-flex justify-content-between bg-transparent text-light"><span>🔥 Workot
                        Mix</span> <span>32 song</span></li>
                <li class="list-group-item d-flex justify-content-between bg-transparent text-light"><span>🌃
                        Evening</span> <span>32 song</span></li>
                <li class="list-group-item d-flex justify-content-between bg-transparent text-light"><span>🚗
                        Travel</span> <span>32 song</span></li>
            </ul>
        </div>
    </div>

    <div class="container-lg">
        <div class="row py-5">
            <div class="col-md-4">
                <h1>Star boy</h1>
                <p>Weekend</p>
            </div>
            <div class="col-md-4">
                <span>
                    <div class="btn-group" role="group" aria-label="Basic example">
                        <button type="button" class="btn btn-primary">⏮️</button>
                        <button type="button" class="btn btn-primary">⏯️</button>
                        <button type="button" class="btn btn-primary">⏭️</button>
                    </div>
                </span>

                <span>
                    <div class="progress" role="progressbar" aria-label="Basic example" aria-valuenow="25"
                        aria-valuemin="0" aria-valuemax="100">
                        <div class="progress-bar" style="width: 25%"></div>
                    </div>
                </span>
            </div>
            <div class="col-md-4">
                <span>🔉</span>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
